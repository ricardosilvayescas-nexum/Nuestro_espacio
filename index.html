<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>¡Felices 6 Meses! ❤️</title>
</head>
<body>

    <div class="container" id="main-card">
        <h1>¡Felices 6 Meses!</h1>
        <p class="subtitle">Mi Amor ❤️</p>

        <div class="timer-box">
            <span class="number">7</span>
            <span>Meses de pura felicidad</span>
            <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">y contando... 🥰</div>
        </div>

        <div class="gallery">
            <div class="polaroid">
                <img src="Viaje.JPG" alt="Nosotros 1">
                <div class="caption">Nuestro 1er viaje</div>
            </div>
            <div class="polaroid">
                <img src="Boda_eva.JPG" alt="Nosotros 2">
                <div class="caption">Mis momentos favoritos</div>
            </div>
        </div>
        
        <p style="font-size: 1rem; color: #444; margin-bottom: 20px;">Tengo una sorpresa para ti...</p>
        
        <button class="btn-love" onclick="iniciarSorpresa()">Toca aquí 💌</button>
    </div>

    <div class="rain-overlay" id="rain-overlay">
        <div class="final-message" id="final-message">
            Gracias por todos y cada uno de los momentos vividos.<br>
            <span style="font-size: 3rem;">Te amo</span> ❤️
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
